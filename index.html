<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zedait</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root{
          --bg:#0b0b0e;
          --elev:#111216;
          --muted:#a1a1aa;
          --text:#e7e7ea;
          --accent:#facc15;
          --accent-2:#ffd43b;
          --ring: rgba(250, 204, 21, 0.35);
          --radius:18px;
          --shadow:0 10px 30px rgba(0,0,0,.35);
          --shadow-2:0 20px 60px rgba(0,0,0,.45);
        }

        *{box-sizing:border-box}
        html,body{height:100%}

        body{
          margin:0;
          background:radial-gradient(1200px 600px at 80% -10%, rgba(250,204,21,.07), transparent 60%),
                     radial-gradient(900px 600px at -10% 20%, rgba(250,204,21,.08), transparent 60%),
                     var(--bg);
          color:var(--text);
          font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
          display:flex;
          justify-content:center;
          align-items:center;
          padding:20px;
        }

        .maint-wrap{
          width:100%;
          max-width:540px;
        }

        .maint-card{
          background:var(--elev);
          border:1px solid #23232a;
          padding:30px 26px;
          border-radius:var(--radius);
          box-shadow:var(--shadow-2);
          text-align:center;
        }

        .maint-title{
          font-size:32px;
          font-weight:700;
          margin:0 0 12px;
          color:var(--accent-2);
        }

        .maint-sub{
          font-size:16px;
          color:var(--muted);
          margin-bottom:20px;
          line-height:1.6;
        }

        .maint-countdown-wrapper {
          background: rgba(255, 255, 255, 0.03);
          border: 1px solid rgba(250, 204, 21, 0.15);
          border-radius: 14px;
          padding: 20px;
          margin-bottom: 26px;
        }

        .countdown-label {
          font-size: 14px;
          color: var(--muted);
          margin: 0 0 15px 0;
        }

        .countdown-timer {
          display: flex;
          justify-content: center;
          gap: 20px;
        }

        .time-box {
          display: flex;
          flex-direction: column;
          align-items: center;
          min-width: 50px;
        }

        .time-val {
          font-size: 26px;
          font-weight: 700;
          color: var(--accent);
          line-height: 1.2;
        }

        .time-text {
          font-size: 12px;
          color: var(--muted);
          text-transform: uppercase;
          letter-spacing: 1px;
          margin-top: 4px;
        }

        .maint-contact p{
          margin:6px 0;
          font-size:15px;
          color:var(--text);
        }

        .maint-contact strong{
          color:var(--accent);
        }
    </style>
</head>

<body>

    <div class="maint-wrap">
        <div class="maint-card">
            <h1 class="maint-title">Duyuru</h1>
            <p class="maint-sub">Dev sürecini sonlandırdım. Artık bir geliştirici değilim, artık daha fazla yenilik gelmeyecektir.</p>

            <div class="maint-countdown-wrapper">
                <p class="countdown-label">Sitenin tamamen kapanmasına kalan süre:</p>
                <div class="countdown-timer" id="countdownTimer">
                    <div class="time-box"><span class="time-val">-</span><span class="time-text">Gün</span></div>
                    <div class="time-box"><span class="time-val">-</span><span class="time-text">Saat</span></div>
                    <div class="time-box"><span class="time-val">-</span><span class="time-text">Dk</span></div>
                    <div class="time-box"><span class="time-val">-</span><span class="time-text">Sn</span></div>
                </div>
            </div>

            <div class="maint-contact">
                <p><strong>E-posta:</strong> contact@zedaitdev.com</p>
                <p><strong>Discord:</strong> _zedait</p>
            </div>
        </div>
    </div>

    <script>
        const targetDate = new Date("2026-08-18T00:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdownTimer").innerHTML = "<div class='time-val'>Site Kapatıldı</div>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdownTimer").innerHTML = `
                <div class="time-box"><span class="time-val">${days}</span><span class="time-text">Gün</span></div>
                <div class="time-box"><span class="time-val">${hours}</span><span class="time-text">Saat</span></div>
                <div class="time-box"><span class="time-val">${minutes}</span><span class="time-text">Dk</span></div>
                <div class="time-box"><span class="time-val">${seconds}</span><span class="time-text">Sn</span></div>
            `;
        }, 1000);
    </script>

</body>
</html>
